<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>톡한장 이미지 저장</title>
<style>
  body { margin: 0; background: #e2e8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; gap: 20px; }
  canvas { border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  button { padding: 14px 40px; background: #2563eb; color: white; border: none; border-radius: 14px; font-size: 18px; font-weight: bold; cursor: pointer; }
  button:hover { background: #1d4ed8; }
</style>
</head>
<body>
<canvas id="c" width="680" height="680"></canvas>
<button onclick="download()">💾 PNG로 저장하기</button>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

function roundRect(x, y, w, h, r, fill, stroke, sw) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x, y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw||1; ctx.stroke(); }
}

function circle(cx, cy, r, fill) {
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle = fill; ctx.fill();
}

function text(t, x, y, size, color, bold, align) {
  ctx.font = (bold?'bold ':'')+size+'px "Noto Sans KR", sans-serif';
  ctx.fillStyle = color;
  ctx.textAlign = align||'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(t, x, y);
}

function draw() {
  // 배경
  ctx.fillStyle = '#f0f6ff'; ctx.fillRect(0,0,680,680);

  // 외곽 테두리
  roundRect(20,20,640,640,36,'#f0f6ff','#93c5fd',3);
  roundRect(30,30,620,620,28,null,'#bfdbfe',1.2);

  // 배경 장식 원
  ctx.globalAlpha=0.5; circle(100,100,80,'#dbeafe');
  ctx.globalAlpha=0.4; circle(580,580,100,'#ede9fe');
  ctx.globalAlpha=0.3; circle(600,120,50,'#dbeafe');
  ctx.globalAlpha=0.35; circle(80,560,60,'#ede9fe');
  ctx.globalAlpha=1;

  // 핸드폰 그림자
  ctx.globalAlpha=0.5; roundRect(249,57,192,372,28,'#c7d9f0');
  ctx.globalAlpha=1;

  // 핸드폰 본체
  roundRect(243,50,192,372,28,'#1e293b','#334155',2);
  // 노치
  roundRect(303,58,72,14,7,'#0f172a');
  // 화면
  roundRect(255,78,168,328,8,'#0f172a');

  // 배지
  roundRect(285,90,108,18,9,'#1e3a8a');
  text('명함형 홈페이지',339,99,9,'#93c5fd',true);

  // 프로필 원
  circle(339,142,26,'#2563eb');
  circle(339,136,10,'#bfdbfe');
  ctx.beginPath(); ctx.ellipse(339,158,16,10,0,0,Math.PI*2);
  ctx.fillStyle='#bfdbfe'; ctx.fill();

  text('김철수',339,182,13,'#f1f5f9',true);
  text('인테리어 전문가',339,198,9,'#94a3b8',false);

  ctx.strokeStyle='#334155'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(271,210); ctx.lineTo(407,210); ctx.stroke();

  // 버튼들
  const btns = [
    [265,218,64,32,'#2563eb','전화'],
    [337,218,64,32,'#16a34a','문자'],
    [265,258,64,32,'#ca8a04','카카오톡'],
    [337,258,64,32,'#7c3aed','예약'],
  ];
  btns.forEach(([x,y,w,h,c,t]) => {
    roundRect(x,y,w,h,10,c);
    text(t,x+w/2,y+h/2,10,'white',true);
  });

  // 지도
  roundRect(265,298,136,36,8,'#1e293b');
  text('오시는 길 안내',333,316,9,'#64748b',false);

  // SNS 박스
  const sns=[
    [271,'인스타','#e1306c'],
    [305,'유튜브','#ff0000'],
    [339,'블로그','#03c75a'],
    [373,'SNS','#1d9bf0'],
  ];
  sns.forEach(([x,label,color])=>{
    roundRect(x,342,26,26,6,color);
    text(label,x+13,355,8,'white',true);
  });

  // 핸드폰 하단 버튼
  roundRect(319,408,40,5,3,'#334155');

  // 타이틀
  text('톡한장',340,460,54,'#0f172a',true);

  ctx.font='13px Arial,sans-serif';
  ctx.fillStyle='#94a3b8'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.letterSpacing='5px';
  ctx.fillText('TOK HANJANG',340,500);
  ctx.letterSpacing='0px';

  // 구분선
  ctx.strokeStyle='#3b82f6'; ctx.lineWidth=1; ctx.globalAlpha=0.5;
  ctx.beginPath(); ctx.moveTo(260,516); ctx.lineTo(420,516); ctx.stroke();
  ctx.globalAlpha=1;

  // 슬로건
  text('핸드폰으로 뚝닥 만드는',340,540,16,'#334155',false);
  text('명함형 홈페이지',340,564,16,'#2563eb',true);

  // 가격 태그
  roundRect(230,580,220,28,14,'#dbeafe');
  text('5만원 · 평생 이용 · 월정액 없음',340,594,12,'#1d4ed8',true);

  // 하단 점
  [[318,'#3b82f6',0.4],[340,'#6366f1',0.7],[362,'#3b82f6',0.4]].forEach(([x,c,a])=>{
    ctx.globalAlpha=a; circle(x,634,4,c);
  });
  ctx.globalAlpha=1;
}

draw();

function download() {
  const a = document.createElement('a');
  a.download = '톡한장_이미지.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
